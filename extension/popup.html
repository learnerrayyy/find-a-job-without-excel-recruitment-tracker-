<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Save Job</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">Job Tracker</p>
          <h1 id="popupTitle">保存当前岗位</h1>
        </div>
        <span id="serverStatus" class="status">Checking</span>
      </header>

      <nav class="tabs">
        <button type="button" class="tab active" data-view-tab="capture">保存岗位</button>
        <button type="button" class="tab" data-view-tab="autofill">自动填入</button>
      </nav>

      <form id="captureForm" data-view="capture">
        <label>
          公司
          <input name="company_name" id="companyInput" required />
        </label>

        <label>
          岗位
          <input name="position_name" id="positionInput" required />
        </label>

        <label>
          分类
          <select name="job_type" id="jobTypeInput">
            <option value="FULL_TIME">Full time</option>
            <option value="PART_TIME">Part time</option>
            <option value="INTERNSHIP">Internship</option>
          </select>
        </label>

        <label>
          JD 页面 URL
          <input name="source_url" id="sourceUrlInput" type="url" />
        </label>

        <label>
          投递入口 URL
          <input name="apply_url" id="applyUrlInput" type="url" />
        </label>

        <label>
          JD 内容
          <textarea name="jd_content" id="jdContentInput" rows="10"></textarea>
        </label>

        <div class="hint" id="captureHint">
          选中页面上的 JD 文本后再点插件，保存会更准确。
        </div>

        <footer>
          <button type="button" id="recaptureBtn">重新抓取</button>
          <button type="submit" class="primary" id="saveBtn">保存</button>
        </footer>
      </form>

      <section class="autofill-panel" data-view="autofill" hidden>
        <div class="profile-list" id="profileList"></div>
        <div class="hint" id="profileHint">
          选择一份简历后填入基础字段；如果网站要求上传 PDF，请使用原始文件入口手动上传。
        </div>
        <footer>
          <button type="button" id="reloadProfilesBtn">刷新 Profile</button>
          <button type="button" class="primary" id="autofillBtn">自动填入</button>
        </footer>
        <div class="autofill-result" id="autofillResult"></div>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
